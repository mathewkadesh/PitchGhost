# Cloudflare Worker config for the PitchGhost live-research proxy.
#
# Deployed via `npx wrangler deploy`. See worker/README.md for the full
# walkthrough.

name = "pitchghost-ghost"
main = "index.ts"
compatibility_date = "2025-01-01"

[vars]
# Comma-separated allowed origins (no trailing slash, no path — CORS only
# checks scheme+host). Includes the deployed Pages origin and localhost for
# local dev.
ALLOWED_ORIGIN = "https://mathewkadesh.github.io,http://localhost:5173"
# Per-IP and global daily request caps for /ghost.
DAILY_LIMIT_PER_IP = "5"
DAILY_GLOBAL_LIMIT = "200"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a8bd327a73704e43835364c6a1d2c866"
